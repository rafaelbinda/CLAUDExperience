<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Frequency</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Word Frequency</h1>
    <p class="subtitle">Analyze how often each word appears in a block of text.</p>

    <div class="card url-card">
      <label class="card-label" for="url-input">Analyze from a URL <span class="optional">(optional)</span></label>
      <div class="url-row">
        <input
          type="url"
          id="url-input"
          placeholder="https://example.com"
          aria-describedby="url-error"
        />
        <button id="fetch-btn" class="btn-secondary">Fetch</button>
      </div>
      <p id="url-error" class="error hidden" role="alert"></p>
    </div>

    <div class="card input-card">
      <div class="input-header">
        <label class="card-label" for="text-input">Text to analyze</label>
        <label class="toggle-label">
          <input type="checkbox" id="case-sensitive" />
          Case sensitive
        </label>
      </div>
      <textarea
        id="text-input"
        maxlength="2048"
        placeholder="Paste or type your text here (max 2048 characters)..."
        rows="8"
        aria-describedby="error-message"
      ></textarea>
      <div class="input-meta">
        <span id="char-count">0 / 2048</span>
      </div>
      <p id="error-message" class="error hidden" role="alert">Please enter some text before analyzing.</p>
      <div class="btn-row">
        <button id="clear-btn" class="btn-secondary">Clear</button>
        <button id="translate-btn">Translate</button>
      </div>
    </div>

    <div id="results-section" class="card results-card hidden" aria-live="polite">
      <h2>Results</h2>
      <div class="chart-container">
        <canvas id="frequency-chart"></canvas>
      </div>
      <table id="frequency-table">
        <thead>
          <tr>
            <th>Word</th>
            <th>Frequency</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
