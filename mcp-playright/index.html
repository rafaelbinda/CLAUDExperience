      text-decoration: underline;

    .avail {

    .avail-out { color: #f87171; }

    .stars {

      white-space: nowrap;
    }

    .star-filled { color: #fbbf24; }
    .star-empty  { color: #334155; }

      margin-top: 2rem;
      font-size: 0.78rem;

function renderStars(ratingWord) {
  const n = ratingMap[ratingWord] || 0;
  return Array.from({ length: 5 }, (_, i) =>
    `<span class="${i < n ? 'star-filled' : 'star-empty'}">★</span>`
  ).join('');
}

const tbody = document.getElementById('tbody');
books.forEach((b, i) => {
  const inStock = b.availability.toLowerCase().includes('in stock');
  tbody.insertAdjacentHTML('beforeend', `
    <tr>
      <td class="num">${i + 1}</td>
      <td class="name"><a href="${b.url}" target="_blank" rel="noopener">${b.name}</a></td>
      <td class="price">${b.price}</td>
      <td class="avail ${inStock ? 'avail-in' : 'avail-out'}">${b.availability}</td>
      <td class="stars">${renderStars(b.rating)}</td>
    </tr>
  `);
